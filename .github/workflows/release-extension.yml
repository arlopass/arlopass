name: Release Extension

on:
  push:
    tags:
      - "extension/v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. extension/v1.2.3)"
        required: true
        type: string
      dry_run:
        description: "Dry-run mode (build only, no store deploy)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  parse-tag:
    name: Parse release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse tag
        id: parse
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ "${TAG}" =~ ^extension/v(.+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unrecognized tag format: ${TAG}"
            exit 1
          fi

  production-gate:
    name: Production Gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Confirm production release gate
        run: echo "Production environment gate passed"

  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/_ci-gate.yml

    with:
      scope: extension
  build:
    name: Build Extension
    needs: [parse-tag, ci-gate]
    uses: ./.github/workflows/_build-extension.yml
    with:
      version: ${{ needs.parse-tag.outputs.version }}

  deploy-chrome:
    name: Deploy to Chrome
    needs: [build, production-gate]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-chrome-store.yml
    secrets:
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

  deploy-edge:
    name: Deploy to Edge
    needs: [build, production-gate]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-edge-store.yml
    secrets:
      EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
      EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}

  deploy-firefox:
    name: Deploy to Firefox
    needs: [build, production-gate]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    uses: ./.github/workflows/_deploy-firefox-store.yml
    secrets:
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

  release-notes:
    name: Create GitHub release notes
    runs-on: ubuntu-latest
    needs: [parse-tag, build, deploy-chrome, deploy-edge, deploy-firefox, production-gate]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.parse-tag.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") || (ver == "" && index($0, "[Unreleased]"))) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            printf "Release %s\n\nExtension store deployment completed.\n" "$VERSION" > release-notes.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.parse-tag.outputs.tag }}
          name: Extension v${{ needs.parse-tag.outputs.version }}
          body_path: release-notes.md
