name: Reliability Gates

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
  schedule:
    # Run nightly soak suite at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_soak:
        description: "Run soak tests (may be slow)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # CI Gate — reusable quality checks (lint, typecheck, test, build)
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/_ci-gate.yml

  # ---------------------------------------------------------------------------
  # Chaos tests — deterministic, run on every push/PR
  # ---------------------------------------------------------------------------
  chaos-tests:
    name: Chaos tests
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run chaos test suite
        run: pnpm run test -- ops/tests/chaos
        env:
          CI: "true"

      - name: Upload chaos test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chaos-test-results
          path: |
            ops/tests/chaos/**/__snapshots__/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Version-skew matrix — deterministic, run on every push/PR
  # ---------------------------------------------------------------------------
  version-skew-tests:
    name: Version-skew matrix
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run version-skew compatibility matrix
        run: pnpm run test -- ops/tests/version-skew

  # ---------------------------------------------------------------------------
  # Adapter conformance tests — deterministic contract/manifest release gates
  # ---------------------------------------------------------------------------
  adapter-conformance-tests:
    name: Adapter conformance tests
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run adapter conformance release gates
        run: pnpm run test -- ops/tests/release-gates

  # ---------------------------------------------------------------------------
  # Soak tests — run nightly and on manual dispatch; skipped on PRs by default
  # ---------------------------------------------------------------------------
  soak-tests:
    name: Soak tests
    runs-on: ubuntu-latest
    needs: ci-gate
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_soak == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run soak test suite
        run: pnpm run test -- ops/tests/soak
        timeout-minutes: 20

  # ---------------------------------------------------------------------------
  # Full reliability gate — required for release branches
  # ---------------------------------------------------------------------------
  reliability-gate:
    name: Reliability gate (required for release)
    runs-on: ubuntu-latest
    needs:
      - chaos-tests
      - version-skew-tests
      - adapter-conformance-tests
    steps:
      - name: Reliability gate summary
        run: |
          echo "## Reliability Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Gate (lint, typecheck, test, build) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Chaos tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Version-skew matrix | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Adapter conformance tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All reliability gates passed. Release is cleared." >> $GITHUB_STEP_SUMMARY
