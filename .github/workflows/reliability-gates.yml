name: Reliability Gates

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
  schedule:
    # Run nightly soak suite at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_soak:
        description: "Run soak tests (may be slow)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Type-checking — fast gate, must pass before any tests run
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck across all workspaces
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Chaos tests — deterministic, run on every push/PR
  # ---------------------------------------------------------------------------
  chaos-tests:
    name: Chaos tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run chaos test suite
        run: npm run test -- ops/tests/chaos
        env:
          CI: "true"

      - name: Upload chaos test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-results
          path: |
            ops/tests/chaos/**/__snapshots__/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Version-skew matrix — deterministic, run on every push/PR
  # ---------------------------------------------------------------------------
  version-skew-tests:
    name: Version-skew matrix
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run version-skew compatibility matrix
        run: npm run test -- ops/tests/version-skew

  # ---------------------------------------------------------------------------
  # Soak tests — run nightly and on manual dispatch; skipped on PRs by default
  # ---------------------------------------------------------------------------
  soak-tests:
    name: Soak tests
    runs-on: ubuntu-latest
    needs: typecheck
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_soak == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run soak test suite
        run: npm run test -- ops/tests/soak
        timeout-minutes: 20

  # ---------------------------------------------------------------------------
  # Full reliability gate — required for release branches
  # ---------------------------------------------------------------------------
  reliability-gate:
    name: Reliability gate (required for release)
    runs-on: ubuntu-latest
    needs:
      - chaos-tests
      - version-skew-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Reliability gate summary
        run: |
          echo "## Reliability Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript type-check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Chaos tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Version-skew matrix | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All reliability gates passed. Release is cleared." >> $GITHUB_STEP_SUMMARY
