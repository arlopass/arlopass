name: Publish to npm

on:
  workflow_call:
    inputs:
      scope:
        description: "Package scope: 'core', 'bridge', or adapter name"
        required: true
        type: string
      version:
        description: "Version to publish (e.g. 0.2.0)"
        required: true
        type: string
      dry-run:
        description: "If true, only run npm publish --dry-run"
        required: false
        default: false
        type: boolean
      auth-mode:
        description: "npm auth mode: trusted (OIDC) or token"
        required: false
        default: "trusted"
        type: string
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish ${{ inputs.scope }}@${{ inputs.version }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-builds-${{ inputs.scope }}

      - name: Determine packages to publish
        id: packages
        run: |
          if [ "${{ inputs.scope }}" = "core" ]; then
            echo "dirs=packages/protocol packages/audit packages/telemetry packages/policy adapters/runtime adapters/tooling packages/web-sdk packages/react-sdk packages/react-ui packages/ai-sdk-transport" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.scope }}" = "bridge" ]; then
            echo "dirs=apps/bridge" >> "$GITHUB_OUTPUT"
          else
            echo "dirs=adapters/${{ inputs.scope }}" >> "$GITHUB_OUTPUT"
          fi

      # Set versions on ALL packages first so pnpm can resolve workspace:*
      # cross-references correctly during publish.
      - name: Set package versions
        run: |
          set -euo pipefail
          for dir in ${{ steps.packages.outputs.dirs }}; do
            (cd "${dir}" && npm pkg set version="${{ inputs.version }}" >/dev/null)
          done

      - name: Publish packages in order
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PUBLISHED=()
          SKIPPED=()
          # --no-git-checks: working tree is dirty from version bumps above.
          PUBLISH_FLAGS="--provenance --access public --no-git-checks"

          AUTH_MODE="${{ inputs.auth-mode }}"
          if [ "${AUTH_MODE}" = "token" ]; then
            if [ -z "${NPM_TOKEN:-}" ]; then
              echo "::error::auth-mode=token but NPM_TOKEN is not set"
              exit 1
            fi
            export NODE_AUTH_TOKEN="${NPM_TOKEN}"
            echo "AUTH mode: npm token"
          elif [ "${AUTH_MODE}" = "trusted" ]; then
            unset NODE_AUTH_TOKEN
            echo "AUTH mode: OIDC trusted publishing"
          else
            echo "::error::Unsupported auth-mode: ${AUTH_MODE}"
            exit 1
          fi

          for dir in ${{ steps.packages.outputs.dirs }}; do
            PKG_NAME=$(node -p "require('./${dir}/package.json').name")
            PKG_VERSION="${{ inputs.version }}"

            # Strip compiled test artifacts from dist to keep release tarballs clean.
            if [ -d "${dir}/dist" ]; then
              find "${dir}/dist" -type d -name "__tests__" -prune -exec rm -rf {} +
              find "${dir}/dist" -type f \( \
                -name "*.test.js" -o \
                -name "*.test.js.map" -o \
                -name "*.test.d.ts" -o \
                -name "*.test.d.ts.map" -o \
                -name "*.spec.js" -o \
                -name "*.spec.js.map" -o \
                -name "*.spec.d.ts" -o \
                -name "*.spec.d.ts.map" \
              \) -delete
            fi

            # Check if already published (idempotency)
            if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
              echo "⏭️  ${PKG_NAME}@${PKG_VERSION} already published, skipping"
              SKIPPED+=("${PKG_NAME}")
              continue
            fi

            # Dry-run first (catch packaging issues)
            echo "🔍 Dry-run: ${PKG_NAME}@${PKG_VERSION}"
            (cd "${dir}" && pnpm publish --dry-run --no-git-checks)

            if [ "${{ inputs.dry-run }}" = "true" ]; then
              echo "🏃 Dry-run mode — skipping real publish for ${PKG_NAME}"
              continue
            fi

            # Real publish with SLSA provenance.
            # pnpm publish resolves workspace:* → concrete versions automatically.
            echo "📦 Publishing: ${PKG_NAME}@${PKG_VERSION}"
            (cd "${dir}" && pnpm publish ${PUBLISH_FLAGS})
            PUBLISHED+=("${PKG_NAME}")
          done

          echo "## npm Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for p in "${PUBLISHED[@]+"${PUBLISHED[@]}"}"; do
            echo "| ${p} | ✅ Published |" >> "$GITHUB_STEP_SUMMARY"
          done
          for s in "${SKIPPED[@]+"${SKIPPED[@]}"}"; do
            echo "| ${s} | ⏭️ Skipped (exists) |" >> "$GITHUB_STEP_SUMMARY"
          done
