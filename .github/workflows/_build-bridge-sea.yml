name: Build Bridge SEA Binaries

on:
  workflow_call:
    inputs:
      version:
        description: "Bridge version"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-sea:
    name: SEA ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: win
            arch: x64
            runner: windows-latest
            binary: arlopass-bridge-win-x64.exe
          - os: macos
            arch: x64
            runner: macos-latest
            node_arch: x64
            binary: arlopass-bridge-macos-x64
          - os: macos
            arch: arm64
            runner: macos-latest
            node_arch: arm64
            binary: arlopass-bridge-macos-arm64
          - os: linux
            arch: x64
            runner: ubuntu-latest
            binary: arlopass-bridge-linux-x64
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            binary: arlopass-bridge-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - name: Setup Node.js
        if: matrix.os != 'macos'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Node.js (macOS arch-specific)
        if: matrix.os == 'macos'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          architecture: ${{ matrix.node_arch }}

      - run: pnpm install --frozen-lockfile

      - name: Build bridge and required dependencies
        run: pnpm -r --filter "@arlopass/bridge..." --if-present run build

      - name: Generate icon assets
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "win" ]; then
            # Windows: generate .ico using ImageMagick (pre-installed on windows-latest)
            cd apps/bridge/assets
            for size in 16 24 32 48 64 128 256; do
              magick -background none -density 300 icon.svg -resize "${size}x${size}" "icon-${size}.png"
            done
            magick icon-16.png icon-24.png icon-32.png icon-48.png icon-64.png icon-128.png icon-256.png icon.ico
          elif [ "${{ matrix.os }}" = "macos" ]; then
            # macOS: generate .icns using rsvg-convert + iconutil
            cd apps/bridge/assets
            brew install --quiet librsvg
            ICONSET=$(mktemp -d)/icon.iconset
            mkdir -p "${ICONSET}"
            for size in 16 32 64 128 256; do
              rsvg-convert -w "$size" -h "$size" icon.svg > "${ICONSET}/tmp-${size}.png"
            done
            cp "${ICONSET}/tmp-16.png"  "${ICONSET}/icon_16x16.png"
            cp "${ICONSET}/tmp-32.png"  "${ICONSET}/icon_16x16@2x.png"
            cp "${ICONSET}/tmp-32.png"  "${ICONSET}/icon_32x32.png"
            cp "${ICONSET}/tmp-64.png"  "${ICONSET}/icon_32x32@2x.png"
            cp "${ICONSET}/tmp-128.png" "${ICONSET}/icon_128x128.png"
            cp "${ICONSET}/tmp-256.png" "${ICONSET}/icon_128x128@2x.png"
            cp "${ICONSET}/tmp-256.png" "${ICONSET}/icon_256x256.png"
            cp "${ICONSET}/tmp-256.png" "${ICONSET}/icon_256x256@2x.png"
            iconutil -c icns "${ICONSET}" -o icon.icns
          fi

      - name: Bundle bridge into single CJS file
        run: |
          pnpm exec esbuild apps/bridge/dist/main.js --bundle --platform=node --target=node20 --format=cjs --outfile=apps/bridge/dist/bridge-bundle.cjs

      - name: Create SEA config
        shell: bash
        run: |
          cat > apps/bridge/sea-config.json << 'EOF'
          {
            "main": "dist/bridge-bundle.cjs",
            "output": "sea-prep.blob",
            "disableExperimentalSEAWarning": true
          }
          EOF

      - name: Generate SEA blob
        working-directory: apps/bridge
        run: node --experimental-sea-config sea-config.json

      - name: Create SEA binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp "$(which node)" "${{ matrix.binary }}"
          npx --yes postject "${{ matrix.binary }}" NODE_SEA_BLOB apps/bridge/sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Create SEA binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item (Get-Command node).Source -Destination "${{ matrix.binary }}"

      - name: Stamp Windows executable metadata
        if: matrix.os == 'win'
        shell: pwsh
        timeout-minutes: 3
        run: |
          $rceditUrl = "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe"
          $rceditExe = Join-Path $env:RUNNER_TEMP "rcedit-x64.exe"
          Invoke-WebRequest -Uri $rceditUrl -OutFile $rceditExe -UseBasicParsing
          & $rceditExe "${{ matrix.binary }}" `
            --set-icon "apps/bridge/assets/icon.ico" `
            --set-version-string "FileDescription" "Arlopass Bridge" `
            --set-version-string "ProductName" "Arlopass Bridge" `
            --set-version-string "CompanyName" "Arlopass" `
            --set-version-string "LegalCopyright" "Copyright (c) Arlopass. MIT License." `
            --set-version-string "OriginalFilename" "arlopass-bridge.exe" `
            --set-version-string "InternalName" "arlopass-bridge" `
            --set-file-version "${{ inputs.version }}.0" `
            --set-product-version "${{ inputs.version }}"
          Write-Host "rcedit: metadata stamped"

      - name: Inject SEA blob (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npx --yes postject "${{ matrix.binary }}" NODE_SEA_BLOB apps/bridge/sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Post-process (macOS ad-hoc re-sign)
        if: matrix.os == 'macos'
        run: |
          codesign --remove-signature "${{ matrix.binary }}"
          codesign -s - -i com.arlopass.bridge "${{ matrix.binary }}"

      - name: Post-process (Linux chmod)
        if: matrix.os == 'linux'
        run: chmod +x "${{ matrix.binary }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bridge-binary-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.binary }}
          retention-days: 5
