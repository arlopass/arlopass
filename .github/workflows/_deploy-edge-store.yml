name: Deploy to Edge Add-ons

on:
  workflow_call:
    secrets:
      EDGE_CLIENT_ID:
        required: true
      EDGE_API_KEY:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Edge Add-ons
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download Chromium extension zip
        uses: actions/download-artifact@v4
        with:
          name: extension-chromium

      - name: Upload package to Edge Add-ons
        id: upload
        env:
          PRODUCT_ID: ${{ vars.EDGE_PRODUCT_ID }}
          CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: |
          set -euo pipefail
          API="https://api.addons.microsoftedge.microsoft.com"
          RETRY=0
          MAX_RETRIES=3

          until [ $RETRY -ge $MAX_RETRIES ]; do
            RESPONSE=$(curl -si -X POST \
              "${API}/v1/products/${PRODUCT_ID}/submissions/draft/package" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "X-ClientID: ${CLIENT_ID}" \
              -H "Content-Type: application/zip" \
              -T arlopass-extension-chromium.zip)

            HTTP_CODE=$(echo "$RESPONSE" | head -1 | grep -oP '\d{3}')
            if [ "${HTTP_CODE}" = "202" ] || [ "${HTTP_CODE}" = "200" ]; then
              echo "✅ Upload accepted (HTTP ${HTTP_CODE})"
              OPERATION_ID=$(echo "$RESPONSE" | grep -i '^Location:' | awk '{print $2}' | tr -d '\r')
              echo "operation_id=${OPERATION_ID}" >> "$GITHUB_OUTPUT"
              break
            fi
            RETRY=$((RETRY + 1))
            echo "⚠️  Upload attempt ${RETRY}/${MAX_RETRIES} failed (HTTP ${HTTP_CODE}), retrying..."
            sleep $((RETRY * 15))
          done

          if [ $RETRY -ge $MAX_RETRIES ]; then
            echo "::error::Edge Add-ons upload failed after ${MAX_RETRIES} attempts"
            exit 1
          fi

      - name: Wait for upload processing
        env:
          PRODUCT_ID: ${{ vars.EDGE_PRODUCT_ID }}
          CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          API_KEY: ${{ secrets.EDGE_API_KEY }}
          OPERATION_ID: ${{ steps.upload.outputs.operation_id }}
        run: |
          set -euo pipefail
          API="https://api.addons.microsoftedge.microsoft.com"
          POLL=0
          MAX_POLLS=20

          while [ $POLL -lt $MAX_POLLS ]; do
            STATUS_BODY=$(curl -fsS \
              "${API}/v1/products/${PRODUCT_ID}/submissions/draft/package/operations/${OPERATION_ID}" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "X-ClientID: ${CLIENT_ID}")

            STATUS=$(echo "$STATUS_BODY" | jq -r '.status')
            echo "Upload status: ${STATUS}"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "✅ Upload processing complete"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "::error::Upload processing failed"
              echo "$STATUS_BODY" | jq .
              exit 1
            fi

            POLL=$((POLL + 1))
            sleep 10
          done

          echo "::error::Upload processing timed out after $((MAX_POLLS * 10))s"
          exit 1

      - name: Publish submission
        id: publish
        env:
          PRODUCT_ID: ${{ vars.EDGE_PRODUCT_ID }}
          CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: |
          set -euo pipefail
          API="https://api.addons.microsoftedge.microsoft.com"

          RESPONSE=$(curl -si -X POST \
            "${API}/v1/products/${PRODUCT_ID}/submissions" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "X-ClientID: ${CLIENT_ID}" \
            -H "Content-Type: application/json" \
            -d '{"notes":"Automated publish via CI/CD"}')

          HTTP_CODE=$(echo "$RESPONSE" | head -1 | grep -oP '\d{3}')
          if [ "${HTTP_CODE}" = "202" ] || [ "${HTTP_CODE}" = "200" ]; then
            echo "✅ Publish request accepted (HTTP ${HTTP_CODE})"
          else
            echo "::error::Publish request failed (HTTP ${HTTP_CODE})"
            echo "$RESPONSE"
            exit 1
          fi
