name: Build Packages

on:
  workflow_call:
    inputs:
      scope:
        description: "Package scope: 'core' for all core packages, or adapter name like 'adapter-ollama'"
        required: true
        type: string
      node-version:
        description: "Node.js version"
        required: false
        default: "22"
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build packages (${{ inputs.scope }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build scoped release targets
        shell: bash
        run: |
          set -euo pipefail

          declare -a targets=()
          if [ "${{ inputs.scope }}" = "core" ]; then
            targets=(
              "@arlopass/protocol"
              "@arlopass/audit"
              "@arlopass/telemetry"
              "@arlopass/policy"
              "@arlopass/adapter-runtime"
              "@arlopass/adapter-tooling"
              "@arlopass/web-sdk"
            )
          elif [ "${{ inputs.scope }}" = "bridge" ]; then
            targets=("@arlopass/bridge")
          else
            targets=("@arlopass/${{ inputs.scope }}")
          fi

          for target in "${targets[@]}"; do
            echo "Building scope: ${target} and dependencies"
            pnpm -r --filter "${target}..." --if-present run build
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-builds-${{ inputs.scope }}
          path: |
            packages/*/dist/
            adapters/*/dist/
            apps/bridge/dist/
          retention-days: 1
