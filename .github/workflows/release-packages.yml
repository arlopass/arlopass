name: Release Packages

on:
  push:
    tags:
      - "core/v*"
      - "adapter/*/v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. core/v1.2.3 or adapter/ollama/v1.2.3)"
        required: true
        type: string
      dry_run:
        description: "Dry-run mode (no real publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  parse-tag:
    name: Parse release tag
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.parse.outputs.scope }}
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse tag
        id: parse
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ "${TAG}" =~ ^core/v(.+)$ ]]; then
            echo "scope=core" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "${TAG}" =~ ^adapter/([^/]+)/v(.+)$ ]]; then
            echo "scope=adapter-${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unrecognized tag format: ${TAG}"
            exit 1
          fi

  production-gate:
    name: Production Gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Confirm production release gate
        run: echo "Production environment gate passed"

  changelog:
    name: Verify changelog entry
    needs: parse-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure version exists in CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.parse-tag.outputs.version }}"
          if ! grep -qE "^## \[${VERSION//./\\.}\]" CHANGELOG.md; then
            echo "::error::Missing CHANGELOG.md section for version ${VERSION}"
            exit 1
          fi

  ci-gate:
    name: CI Gate
    needs:
      - changelog
      - parse-tag
    uses: ./.github/workflows/_ci-gate.yml

    with:
      scope: ${{ needs.parse-tag.outputs.scope }}
  build:
    name: Build
    needs: [parse-tag, ci-gate]
    uses: ./.github/workflows/_build-packages.yml
    with:
      scope: ${{ needs.parse-tag.outputs.scope }}

  publish:
    name: Publish to npm
    needs: [parse-tag, build, production-gate]
    uses: ./.github/workflows/_publish-npm.yml
    with:
      scope: ${{ needs.parse-tag.outputs.scope }}
      version: ${{ needs.parse-tag.outputs.version }}
      dry-run: ${{ github.event.inputs.dry_run == 'true' || false }}
    permissions:
      contents: read
      id-token: write

  release-notes:
    name: Create GitHub release notes
    runs-on: ubuntu-latest
    needs: [parse-tag, publish, production-gate]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.parse-tag.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") || (ver == "" && index($0, "[Unreleased]"))) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            printf "Release %s\n\nPublished scope: %s\n" "$VERSION" "${{ needs.parse-tag.outputs.scope }}" > release-notes.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.parse-tag.outputs.tag }}
          name: Packages ${{ needs.parse-tag.outputs.scope }} v${{ needs.parse-tag.outputs.version }}
          body_path: release-notes.md
